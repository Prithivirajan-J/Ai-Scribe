<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teacher Login</title>
  <style>
    :root{--primary:#2a5298;--bg:#f4f7fa;--card:#fff}
    body{
      background:var(--bg);
      font-family:Segoe UI,Arial,sans-serif;
      margin:0;
      padding:0;
    }
    header{
      background:var(--primary);
      color:#fff;
      padding:16px;
      text-align:center;
      font-weight:700;
    }
    .container{
      max-width:420px;
      margin:60px auto;
      background:var(--card);
      padding:28px;
      border-radius:14px;
      box-shadow:0 8px 30px rgba(0,0,0,0.08);
    }
    h2{margin-top:0;color:#222;}
    label{display:block;margin-bottom:6px;font-size:0.9rem;}
    input[type="text"], input[type="password"]{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-bottom:14px;
      font-size:0.95rem;
    }
    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-size:0.95rem;
    }
    button:hover{opacity:.9;}
    .error{color:#c0392b;font-size:0.9rem;margin-bottom:8px;}
    .back-link{
      margin-top:12px;
      text-align:center;
      font-size:0.9rem;
    }
    .back-link a{text-decoration:none;color:var(--primary);}
  </style>
</head>
<body>
<header>Teacher / Admin Login</header>

<div class="container">
  <h2>Log in</h2>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required />

    <button type="submit">Login</button>
  </form>

  <div class="back-link">
    <a href="{{ url_for('role_select') }}">← Back to role selection</a>
  </div>
</div>
</body>
</html>
