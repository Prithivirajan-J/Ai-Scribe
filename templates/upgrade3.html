<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Voice-First Accessible Exam</title>

<style>
:root{--primary:#2a5298;--bg:#f4f7fa;--card:#fff}
body{background:var(--bg);font-family:Segoe UI,Arial,sans-serif;margin:0;padding:0}
header{background:var(--primary);color:#fff;padding:14px;text-align:center;font-weight:700}
.container{max-width:820px;margin:28px auto;background:var(--card);padding:26px;border-radius:12px;box-shadow:0 6px 30px rgba(0,0,0,0.06)}
.question-label{font-size:1.15rem;margin-bottom:10px;color:#222}
.options label{display:block;padding:10px;border-radius:8px;margin-bottom:8px;background:#f2f6fb;cursor:pointer;transition:background .2s}
.options label:hover{background:#e7effb}
.options input{margin-right:10px}
#timer{font-weight:700;color:#f4a400;text-align:right}
#progress-container{background:#e6eefc;border-radius:999px;height:10px;overflow:hidden;margin:10px 0}
#progress-bar{height:10px;background:linear-gradient(90deg,#2a5298,#f4a400);width:0%}
#popup{display:none;position:fixed;right:22px;bottom:22px;background:#2a5298;color:#fff;padding:10px 14px;border-radius:8px}
.small{font-size:0.9rem;color:#666}
</style>
</head>

<body>

<header style="display:flex;justify-content:space-between;align-items:center;">
  <span id="exam-header-title">
    Accessible Voice Exam — Say "Start" to begin
  </span>

  <div id="student-badge"
       style="display:none;flex-direction:column;background:#fff;color:#000;
              padding:6px 14px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.15);
              font-size:14px;line-height:1.4;">
    <div id="student-badge-name">Name: ---</div>
    <div id="student-badge-reg">Reg No: ---</div>
  </div>
</header>

<div class="container">
  <div id="timer" class="small"></div>
  <div id="progress-container"><div id="progress-bar"></div></div>

  <h2 id="section-title">Waiting to start...</h2>

  <div id="question-container" class="small">
    Say <b>start</b> to begin. Answer using "Option A", "B", etc.
  </div>
</div>

<div id="popup"></div>

<script>

let questions = {mcq:[], qa:[]};
let currentSection='mcq';
let currentIndex=0;
let isStarted=false;
let isAwaitingNext=false;
let recordingLocked=false;
let totalTime=300;
let timeLeft=totalTime;
let globalTimer=null;
let faceVerified=false;

/* ================= FACE VERIFY ================= */

async function verifyFace(){
  return new Promise((resolve,reject)=>{
    navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
      const video=document.createElement('video');
      video.srcObject=stream;
      video.play();

      showPopup("Capturing face...");

      setTimeout(()=>{
        const canvas=document.createElement('canvas');
        canvas.width=video.videoWidth;
        canvas.height=video.videoHeight;
        canvas.getContext('2d').drawImage(video,0,0);

        const imgData=canvas.toDataURL('image/jpeg');

        fetch('/verify_face',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({image:imgData})
        })
        .then(r=>r.json())
        .then(data=>{
          stream.getTracks().forEach(t=>t.stop());

          if(data.verified){
            faceVerified=true;

            document.getElementById("student-badge-name").innerText =
              "Name: " + (data.name || "Unknown");
            document.getElementById("student-badge-reg").innerText =
              "Reg No: " + (data.reg_no || "—");

            document.getElementById("student-badge").style.display="flex";
            document.getElementById("exam-header-title").textContent="Accessible Voice Exam";

            showPopup("Face verified");
            setTimeout(hidePopup,1000);
            resolve(true);
          } else {
            showPopup("Face mismatch");
            setTimeout(hidePopup,1500);
            resolve(false);
          }
        });
      },2000);
    }).catch(reject);
  });
}

/* ================= LOAD QUESTIONS ================= */

fetch('/questions')
  .then(r=>r.json())
  .then(data=>{
    questions=data;
    setIdleUI();
    startWakeLoop();
  });

function setIdleUI(){
  document.getElementById('section-title').textContent="Say 'start' to begin";
}

/* ================= FAST WAKE LISTENER ================= */

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

let wakeRecognition=null;

async function startWakeLoop(){

  if(!faceVerified){
    const ok=await verifyFace();
    if(!ok){ setTimeout(startWakeLoop,1500); return; }
  }

  if(!SpeechRecognition){
    showPopup("Speech not supported");
    return;
  }

  wakeRecognition=new SpeechRecognition();
  wakeRecognition.lang="en-US";
  wakeRecognition.continuous=true;
  wakeRecognition.interimResults=false;

  wakeRecognition.onresult=(e)=>{
    const text=e.results[e.results.length-1][0].transcript.toLowerCase().trim();

    if(/\b(start|begin|go)\b/.test(text)){
      wakeRecognition.stop();

      showPopup("Starting exam...");
      setTimeout(()=>{
        hidePopup();
        beginExam();
      },600);
    }
  };

  wakeRecognition.onend=()=>{
    if(!isStarted) startWakeLoop();
  };

  wakeRecognition.start();
}

/* ================= EXAM START ================= */

function beginExam(){
  isStarted=true;
  startGlobalTimer();
  showQuestion();
}

/* ================= TIMER ================= */

function startGlobalTimer(){
  updateTimer();
  globalTimer=setInterval(()=>{
    timeLeft--;
    updateTimer();
  },1000);
}

function updateTimer(){
  if(timeLeft<=0){
    clearInterval(globalTimer);
    submitExam();
    return;
  }

  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;

  document.getElementById('timer').textContent=
    `Time Left: ${m}:${String(s).padStart(2,'0')}`;

  const percent=100*(totalTime-timeLeft)/totalTime;
  document.getElementById('progress-bar').style.width=percent+"%";
}

/* ================= QUESTION ================= */

function showQuestion(){
  const q=questions.mcq[currentIndex];

  document.getElementById('question-container').innerHTML =
    `<div class="question-label">${q.question}</div>` +
    q.options.map(o=>`<label>${o}</label>`).join('');
}

/* ================= SUBMIT ================= */

function submitExam(){
  fetch('/submit',{method:'POST'});
  document.getElementById('question-container').innerHTML=
    "<h3>Exam submitted</h3>";
}

/* ================= UTIL ================= */

function showPopup(msg){
  const p=document.getElementById('popup');
  p.textContent=msg;
  p.style.display='block';
}

function hidePopup(){
  document.getElementById('popup').style.display='none';
}

</script>
</body>
</html>
